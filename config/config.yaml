# ─────────────────────────────────────────────
# Faithfulness-Aware Legal RAG
# config/config.yaml
# ─────────────────────────────────────────────

# ── Project ───────────────────────────────────
project:
  name: "Faithfulness-Aware Legal RAG"
  version: "1.0.0"
  description: "Automatic Detection and Mitigation of Contextual Hallucinations in the Legal Domain"

# ── Paths ─────────────────────────────────────
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  chroma_db: "data/chroma_db"
  graph_store: "data/graph_store"

# ── LLM ───────────────────────────────────────
llm:
  provider: "groq"
  model: "llama-3.1-8b-instant"
  temperature: 0.0
  max_tokens: 350

# ── Embeddings ────────────────────────────────
embeddings:
  model: "law-ai/InLegalBERT"
  max_length: 512
  batch_size: 32

# ── Retrieval ─────────────────────────────────
retrieval:
  top_k_vector: 5
  top_k_graph: 3
  similarity_threshold: 0.6

# ── Chunking ──────────────────────────────────
chunking:
  strategy: "hierarchical"
  max_chunk_size: 512
  overlap: 50
  hierarchy_levels:
    - "part"
    - "chapter"
    - "article"
    - "section"
    - "clause"

# ── Hallucination Detection ───────────────────
hallucination:
  supported_threshold: 0.75      # score above this → 🟢 Supported
  uncertain_threshold: 0.45      # score between this and supported → 🟡 Uncertain
                                  # score below uncertain → 🔴 Hallucinated
  span_min_tokens: 5             # minimum token length for a span

# ── Faithfulness Scoring ─────────────────────
faithfulness:
  weights:
    faithfulness_score: 0.5
    unsupported_claim_score: 0.3
    evidence_coverage_score: 0.2

# ── Self-Correction ───────────────────────────
correction:
  max_correction_attempts: 2
  re_retrieval_top_k: 3

# ── API ───────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  debug: false

# ── Streamlit ─────────────────────────────────
ui:
  title: "Faithfulness-Aware Legal RAG"
  page_icon: "⚖️"
  max_pdf_size_mb: 10
